<!DOCTYPE html>
<html>
<head>
<title>Update Recipe</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    margin:0;
    padding:0;
}

/* Navbar */

.navbar{
    background:#111;
    color:white;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-weight:bold;
}

.navbar a:hover{
    color:#ffc107;
}

/* Container */

.container{
    width:60%;
    margin:auto;
    margin-top:50px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:30px;
}

/* Form */

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:5px;
}

input, textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

/* Update button */

button{
    background:#007bff;
    color:white;
    padding:10px 25px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#0069d9;
}

/* Image */

img{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:8px;
    margin-top:10px;
}

</style>

</head>

<body>

<!-- Navbar -->

<div class="navbar">

<div>
🍲 Recipe Manager
</div>

<div>
<a href="/">Home</a>
<a href="/receipes/">Recipes</a>
</div>

</div>


<div class="container">

<h2>Update Recipe</h2>

<form method="post" enctype="multipart/form-data">
{% csrf_token %}

<div class="form-group">
<label>Recipe Name</label>
<input name="receipe_name" type="text" value="{{receipe.receipe_name}}" required>
</div>

<div class="form-group">
<label>Recipe Description</label>
<textarea name="receipe_description" rows="4" required>{{receipe.receipe_description}}</textarea>
</div>

<div class="form-group">
<label>Current Image</label><br>

{% if receipe.receipe_image %}
<img src="{{receipe.receipe_image.url}}">
{% else %}
<p>No Image</p>
{% endif %}

</div>

<div class="form-group">
<label>Change Image</label>
<input name="receipe_image" type="file">
</div>

<button type="submit">Update Recipe</button>

</form>

</div>

</body>
</html>
